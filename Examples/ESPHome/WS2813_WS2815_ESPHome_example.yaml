esphome:
  name: digital-led-strip-controller
  friendly_name: Universal Digital LED Strip Controller
  on_boot:
    priority: 600
    then:
      - output.turn_off: backup

esp32:
  board: dfrobot_firebeetle2_esp32s3 # Same Flash and PSRAM
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

ota:
  - platform: esphome
    password: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Digital-Led-Strip-Controller-V11"
    password: "XXXXXXXXXXXX"

captive_portal:


output:
  - platform: gpio
    pin: GPIO34
    id: "backup"

sensor:
  - platform: adc
    pin: GPIO8
    name: "VCC"
    attenuation: 12db
    update_interval: 10s
    filters:
      - multiply: 4.03

light:
  - platform: status_led
    name: "LED"
    pin: 35

## Neopixel WS2813/WS2815
  - platform: neopixelbus 
    type: GRB
    variant: ws2813
    pin: GPIO33
    num_leds: 60
    name: "NeoPixel Light"

